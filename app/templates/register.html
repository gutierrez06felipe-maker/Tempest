{% extends "base.html" %}
{% block title %}Crear Cuenta — TEMPEST{% endblock %}

{% block content %}
<div class="form-page">
  <div class="container">
    <div class="form-header">
      <h1>CREAR CUENTA</h1>
      <p>ÚNETE A LA COMUNIDAD TEMPEST</p>
    </div>

    <div class="form-box">
      <form method="post" action="{{ url_for('auth.register_page') }}">
        <div class="form-row">
          <label>NOMBRE COMPLETO</label>
          <input class="form-input" type="text" name="name" placeholder="Tu nombre" required>
        </div>
        <div class="form-row">
          <label>CORREO ELECTRÓNICO</label>
          <div class="form-input-with-icon">
            <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
            <input class="form-input" type="email" name="email" placeholder="tu@email.com" required>
          </div>
        </div>
        <div class="form-row">
          <label>CONTRASEÑA</label>
          <div class="form-input-with-icon">
            <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            <input class="form-input" type="password" name="password" placeholder="Mínimo 6 caracteres" required minlength="6">
          </div>
        </div>
        <div class="form-row">
          <label>CONFIRMAR CONTRASEÑA</label>
          <div class="form-input-with-icon">
            <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            <input class="form-input" type="password" name="confirm" placeholder="Repite tu contraseña" required>
          </div>
        </div>
        <div class="form-row">
          <label>TELÉFONO</label>
          <input class="form-input" type="tel" name="phone" placeholder="+57 300 000 0000">
        </div>
        <div class="form-row">
          <label>DIRECCIÓN</label>
          <input class="form-input" type="text" name="address" placeholder="Calle, número, apartamento">
        </div>
        <div class="form-row">
          <label>TIPO DE CUENTA</label>
          <select class="form-select" name="role">
            <option value="client">Cliente</option>
            <option value="admin">Administrador</option>
          </select>
        </div>
        <div class="form-row">
          <label>CLAVE ADMINISTRADOR</label>
          <input class="form-input" type="password" name="adminPass" placeholder="Solo si crearás una cuenta admin">
        </div>
        <button type="submit" class="btn btn--primary btn--full">CREAR MI CUENTA →</button>
      </form>

      <p class="form-link" style="text-align:center; margin-top: 20px;">
        ¿Ya tienes cuenta? <a href="{{ url_for('auth.login_page') }}">Iniciar sesión</a>
      </p>
    </div>
  </div>
</div>
{% endblock %}
