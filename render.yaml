services:
  - type: web
    name: tempest-commerce
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn run:app
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_EMAIL
        value: admin@tempest.app
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_INVITE_SECRET
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: tempest-db
          property: connectionString

databases:
  - name: tempest-db
    plan: free
