{% extends "base.html" %}

{% block title %}Login | Tempest Commerce{% endblock %}

{% block content %}
<section class="section" style="display:grid;place-items:center;min-height:70vh;">
    <div class="auth-card" style="width:min(520px, 100%);">
        <div class="section-label">acceso</div>
        <h2 class="section-title" style="margin-bottom:12px;">Iniciar Sesion</h2>
        <p style="margin-bottom:24px;">Accede a tu cuenta para guardar carrito, comprar y administrar tu experiencia dentro de Tempest.</p>
        <form method="post">
            <label>
                Email
                <input type="email" name="email" placeholder="tu@email.com" required>
            </label>
            <label>
                Contrasena
                <input type="password" name="password" placeholder="********" required>
            </label>
            <button type="submit" class="btn btn-primary">Entrar</button>
        </form>
    </div>
</section>
{% endblock %}
